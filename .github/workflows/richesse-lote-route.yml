name: "Richesse Lote Route v2"
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" | base64 -d > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
      - env:
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          ssh -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no "$ORACLE_USER@$ORACLE_HOST" "set -euo pipefail && sudo cp /etc/caddy/Caddyfile /etc/caddy/Caddyfile.bak.lote.\$(date +%s) && if grep -q loteDetalhe /etc/caddy/Caddyfile; then echo SKIP_ALREADY_EXISTS; else sudo sed -i '/^richesseclub.com, www.richesseclub.com {/,/root \* \/var\/www\/richesseclub/{/root \* \/var\/www\/richesseclub/a\\n    @loteDetalhe path_regexp ^/lote/[^/]+\$\n    rewrite @loteDetalhe /lote.html\n}' /etc/caddy/Caddyfile; fi && sudo /usr/bin/caddy validate --config /etc/caddy/Caddyfile && sudo systemctl reload caddy && echo PROBE_LOTE_SLUG && curl -sI http://127.0.0.1/lote/caixa-test -H 'Host: richesseclub.com' | head -3 && echo PROBE_LOTE_HTML && curl -sI http://127.0.0.1/lote.html -H 'Host: richesseclub.com' | head -3"
