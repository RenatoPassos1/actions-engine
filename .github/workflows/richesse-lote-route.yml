name: "Richesse Lote Route v4"
on:
  workflow_dispatch:
jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" | base64 -d > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
      - env:
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          ssh -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no "$ORACLE_USER@$ORACLE_HOST" 'set -euo pipefail && sudo cp /etc/caddy/Caddyfile /etc/caddy/Caddyfile.bak.lote4.$(date +%s) && if grep -q loteDetalhe /etc/caddy/Caddyfile; then echo SKIP_EXISTS; else sudo awk "/[[:space:]]*@siteJs[[:space:]]+path/ && !d {print; print \"\"; print \"    @loteDetalhe path_regexp ^/lote/[^/]+\$\"; print \"    rewrite @loteDetalhe /lote.html\"; d=1; next} {print}" /etc/caddy/Caddyfile | sudo tee /etc/caddy/Caddyfile.new > /dev/null && sudo mv /etc/caddy/Caddyfile.new /etc/caddy/Caddyfile; fi && sudo grep -n loteDetalhe /etc/caddy/Caddyfile && sudo /usr/bin/caddy validate --config /etc/caddy/Caddyfile && sudo systemctl reload caddy && echo PROBE && curl -sI http://127.0.0.1/lote/caixa-test -H "Host: richesseclub.com" | head -3'
