name: Buscar motoristas Portugal

on:
  workflow_dispatch:
    inputs:
      run_budget_seconds:
        description: "Tempo máx. por execução em segundos (ex.: 10800 = 3h)"
        required: false
        default: "10800"
  schedule:
    - cron: "0 */6 * * *"

concurrency:
  group: scrape-motoristas
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          repository: RenatoPassos1/emprego-portugal
          token: ${{ secrets.REPO_PAT }}

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        working-directory: scraper
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Rodar scraper + gerar painel + deploy
        working-directory: scraper
        env:
          MOTORISTA: "1"
          MAX_LISTING_PAGES: "0"
          MAX_COMPANIES: "0"
          RUN_BUDGET_SECONDS: ${{ github.event.inputs.run_budget_seconds || '10800' }}
          ONLY_WITH_EMAIL: "1"
          OUTPUT_DIR: ${{ github.workspace }}/output
          DATA_DIR: ${{ github.workspace }}/data
          SITE_USER: ${{ secrets.PE_SITE_USER }}
          SITE_PASS: ${{ secrets.PE_SITE_PASS }}
        run: |
          python scrape.py
          python build_html.py
          python build_deploy.py

      - name: Commit da base acumulada
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/companies_motorista.json data/state_motorista.json
          git commit -m "Atualiza base de motoristas (via actions-engine) [skip ci]" || echo "sem alteracoes"
          git push || echo "nada a enviar"

      - name: Publicar pasta pronta para o Hostinger
        uses: actions/upload-artifact@v4
        with:
          name: site-hostinger-motoristas
          path: output/deploy/**
          include-hidden-files: true
          retention-days: 30
