# UtilizAí — Enrichment de questões (SEO thin content fix) - MATRIX 4 SHARDS
#
# Contexto: ~10.5k questões publicadas tinham 119 palavras médias, classificadas
# como "thin content" no GSC. Este workflow enriquece metadata.seo_intro_pt/en,
# seo_topics_pt/en, seo_faq_pt/en e (se faltar) explanation via LLM.
#
# Estratégia matrix: 4 shards paralelos. Cada shard pega ~1/4 dos itens via
# FNV-1a hash do slug % 4. Sem overlap, sem duplicação. 4 jobs paralelos =
# 4x mais throughput que single-job.
#
# Persistência: tabela `questions` (Supabase). Idempotente, skipa quem já tem
# metadata.seo_intro_pt > 200 chars.
#
# Schedule: a cada 5h. Cada run processa quanto couber em 350 min.
# DeepSeek paid tier aceita 30+ concurrent (testado), então 4 shards × conc 8 = 32
# workers totais fica confortável dentro do rate limit.
#
# Secrets esperados:
#   REPO_PAT, UTILIZAI_DEEPSEEK_API_KEY, UTILIZAI_GROQ_API_KEY[_2-5],
#   UTILIZAI_SUPABASE_URL, UTILIZAI_SUPABASE_SERVICE_ROLE_KEY

name: "UtilizAí: Enrich Questions (SEO)"

on:
  schedule:
    - cron: '15 */5 * * *'
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Workers paralelos por shard (default 8)"
        required: false
        default: "8"
      limit:
        description: "Limite por shard (default 99999)"
        required: false
        default: "99999"
      total_shards:
        description: "Total de shards paralelos (default 8)"
        required: false
        default: "8"

concurrency:
  group: utilizai-enrich-questions
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  enrich:
    name: Shard ${{ matrix.shard }}/${{ github.event.inputs.total_shards || '8' }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]

    steps:
      - name: Checkout UtilizAi (private)
        uses: actions/checkout@v4
        with:
          repository: RenatoPassos1/UtilizAi
          token: ${{ secrets.REPO_PAT }}
          ref: main
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Run enrichment (shard ${{ matrix.shard }})
        env:
          NEXT_PUBLIC_SUPABASE_URL:   ${{ secrets.UTILIZAI_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:        ${{ secrets.UTILIZAI_SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY:           ${{ secrets.UTILIZAI_DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL:          https://api.deepseek.com
          DEEPSEEK_MODEL:             deepseek-v4-flash
          GROQ_API_KEY:               ${{ secrets.UTILIZAI_GROQ_API_KEY }}
          GROQ_API_KEY_2:             ${{ secrets.UTILIZAI_GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:             ${{ secrets.UTILIZAI_GROQ_API_KEY_3 }}
          GROQ_API_KEY_4:             ${{ secrets.UTILIZAI_GROQ_API_KEY_4 }}
          GROQ_API_KEY_5:             ${{ secrets.UTILIZAI_GROQ_API_KEY_5 }}
          GROQ_MODELS:                "meta-llama/llama-4-scout-17b-16e-instruct,qwen/qwen3-32b,llama-3.3-70b-versatile,allam-2-7b"
          NODE_OPTIONS:               "--max-old-space-size=4096"
        run: |
          set -eu
          CONCURRENCY="${{ github.event.inputs.concurrency || '8' }}"
          LIMIT="${{ github.event.inputs.limit || '99999' }}"
          TOTAL_SHARDS="${{ github.event.inputs.total_shards || '8' }}"
          SHARD="${{ matrix.shard }}"
          echo "Starting enrich-thin-questions.ts shard=${SHARD}/${TOTAL_SHARDS} concurrency=${CONCURRENCY} limit=${LIMIT}"
          npx tsx scripts/enrich-thin-questions.ts \
            --concurrency "${CONCURRENCY}" \
            --limit "${LIMIT}" \
            --shard "${SHARD}" \
            --total-shards "${TOTAL_SHARDS}"

  summary:
    name: Coverage summary
    runs-on: ubuntu-latest
    needs: enrich
    if: always()
    steps:
      - name: Report enrichment coverage
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.UTILIZAI_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.UTILIZAI_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set +e
          ENRICHED=$(curl -sS \
            "${NEXT_PUBLIC_SUPABASE_URL}/rest/v1/questions?select=id&status=eq.published&metadata->>seo_intro_pt=not.is.null" \
            -H "apikey: ${SUPABASE_SECRET_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SECRET_KEY}" \
            -H "Prefer: count=exact" \
            -H "Range: 0-0" -I 2>/dev/null | grep -i 'content-range' | awk -F'/' '{print $2}' | tr -d '\r')
          TOTAL=$(curl -sS \
            "${NEXT_PUBLIC_SUPABASE_URL}/rest/v1/questions?select=id&status=eq.published" \
            -H "apikey: ${SUPABASE_SECRET_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SECRET_KEY}" \
            -H "Prefer: count=exact" \
            -H "Range: 0-0" -I 2>/dev/null | grep -i 'content-range' | awk -F'/' '{print $2}' | tr -d '\r')
          echo "## UtilizAí — Enrich Questions (Matrix 8 shards)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Data:** $(TZ='America/Sao_Paulo' date +'%d/%m/%Y %H:%M BRT')" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Enriched/Total:** \`${ENRICHED:-?}/${TOTAL:-?}\`" >> $GITHUB_STEP_SUMMARY
