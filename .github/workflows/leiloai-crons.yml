# LeilôAI — Crons (fonte primária)
#
# Dispara workers Cloudflare que não têm cron próprio (limite Free = 5 triggers).
# Também roda hard-delete de contas soft-deleted há mais de 30 dias (LGPD).
#
# Secrets necessários:
#   LEILOAI_DISPARO_SECRET  — secret x-disparo-secret dos workers
#   LEILOAI_SUPABASE_URL    — https://<ref>.supabase.co
#   LEILOAI_SUPABASE_SR     — service_role key

name: "LeilôAI: Crons"

on:
  schedule:
    # bancos + ingestao_diaria (doe/djen/datajud/agregadores): 11h UTC (08h BRT)
    - cron: '0 11 * * *'
    # enrichment: a cada 2h
    - cron: '0 */2 * * *'
    # hard-delete LGPD + orchestrator_safety: diário, 03h UTC (00h BRT)
    - cron: '0 3 * * *'
    # marketplaces: a cada 4h (ML API + scrapers OLX/ZAP/VivaReal + Webmotors/iCarros/FIPE)
    - cron: '15 */4 * * *'
    # rental + querido-diario (diarios oficiais municipais): 1x/dia 09h UTC
    - cron: '0 9 * * *'
    # enrichment-ia: a cada 3h (extracao de editais via OpenAI)
    - cron: '20 */3 * * *'
    # inss (editais de imoveis INSS): a cada 12h
    - cron: '30 */12 * * *'
    # seuimovelbb (scan IDs BB): a cada 6h
    - cron: '40 */6 * * *'
    # spyleiloes (sitemap UFs): a cada 6h
    - cron: '50 */6 * * *'
  workflow_dispatch:
    inputs:
      job:
        description: "Qual cron rodar"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - bancos
          - enrichment
          - hard_delete
          - marketplaces
          - rental
          - enrichment_ia
          - orchestrator
          - inss
          - seuimovelbb
          - spyleiloes
          - querido_diario

concurrency:
  group: leiloai-crons-${{ github.event.schedule || github.event.inputs.job }}
  cancel-in-progress: false

jobs:
  bancos:
    if: >-
      github.event.schedule == '0 11 * * *' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'bancos'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Dispara worker bancos
        env:
          DISPARO: ${{ secrets.LEILOAI_DISPARO_SECRET }}
        run: |
          set -euo pipefail
          curl -sSf -H "x-disparo-secret: ${DISPARO}" \
            "https://leiloai-ingestao-bancos.renatopassos516.workers.dev/run" \
            | tee /tmp/resp.json | head -c 500
          echo

  enrichment:
    if: >-
      github.event.schedule == '0 */2 * * *' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'enrichment'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispara worker enrichment
        env:
          DISPARO: ${{ secrets.LEILOAI_DISPARO_SECRET }}
        run: |
          set -euo pipefail
          curl -sSf -H "x-disparo-secret: ${DISPARO}" \
            "https://leiloai-enrichment.renatopassos516.workers.dev/run" \
            | tee /tmp/resp.json | head -c 500
          echo

  ingestao_diaria:
    if: >-
      github.event.schedule == '0 11 * * *' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'bancos'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        worker: [doe, djen, datajud, agregadores]
    steps:
      - name: Dispara worker ${{ matrix.worker }}
        env:
          DISPARO: ${{ secrets.LEILOAI_DISPARO_SECRET }}
          WURL: "https://leiloai-ingest-${{ matrix.worker }}.renatopassos516.workers.dev/run"
        run: |
          set -uo pipefail
          # Workers de ingestao rodam longo no Cloudflare. Se estourar o
          # --max-time (curl exit 28) o worker continua processando
          # server-side e o job orchestrator_safety re-dispara pela
          # cadencia em jobs_log -> kickoff timeout nao derruba o cron.
          # Erros de conexao/HTTP/auth seguem fatais (3 tentativas).
          rc=0; HTTP=000
          for attempt in 1 2 3; do
            set +e
            HTTP=$(curl -sS -o /tmp/resp.txt -w "%{http_code}" \
              -H "x-disparo-secret: ${DISPARO}" \
              --max-time 600 "$WURL")
            rc=$?
            set -e
            if [ "$rc" -eq 0 ] && [ "$HTTP" = "200" ]; then
              head -c 500 /tmp/resp.txt; echo
              exit 0
            fi
            if [ "$rc" -eq 28 ]; then
              echo "::warning::${{ matrix.worker }}: kickoff excedeu 600s (curl 28); worker segue rodando, orchestrator_safety cobre"
              exit 0
            fi
            echo "tentativa ${attempt}: rc=${rc} http=${HTTP}"
            [ "$attempt" -lt 3 ] && sleep $(( attempt * 20 ))
          done
          echo "::error::${{ matrix.worker }}: falhou apos 3 tentativas (rc=${rc} http=${HTTP})"
          head -c 500 /tmp/resp.txt 2>/dev/null || true
          exit 1

  marketplaces:
    if: >-
      github.event.schedule == '15 */4 * * *' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'marketplaces'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Dispara worker marketplaces (ML API + OLX/ZAP/VivaReal)
        env:
          DISPARO: ${{ secrets.LEILOAI_DISPARO_SECRET }}
        run: |
          set -euo pipefail
          curl -sSf -X POST -H "x-disparo-secret: ${DISPARO}" \
            "https://leiloai-ingestao-marketplaces.renatopassos516.workers.dev/run" \
            --max-time 600 \
            | head -c 500
          echo

  rental:
    if: >-
      github.event.schedule == '0 9 * * *' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'rental'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Dispara worker rental (QuintoAndar/VivaReal/ZAP aluguel)
        env:
          DISPARO: ${{ secrets.LEILOAI_DISPARO_SECRET }}
        run: |
          set -euo pipefail
          curl -sSf -X POST -H "x-disparo-secret: ${DISPARO}" \
            "https://leiloai-ingestao-rental.renatopassos516.workers.dev/run" \
            --max-time 600 \
            | head -c 500
          echo

  enrichment_ia:
    if: >-
      github.event.schedule == '20 */3 * * *' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'enrichment_ia'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Dispara worker enrichment-ia (extracao editais OpenAI)
        env:
          DISPARO: ${{ secrets.LEILOAI_DISPARO_SECRET }}
        run: |
          set -euo pipefail
          curl -sSf -X POST -H "x-disparo-secret: ${DISPARO}" \
            "https://leiloai-enrichment-ia.renatopassos516.workers.dev/run" \
            --max-time 600 \
            | head -c 500
          echo

  orchestrator_safety:
    # Safety net: se algum cron acima falhar, orchestrator decide quais
    # workers re-disparar com base na cadencia em jobs_log.
    # Cron automatico diario 03h UTC (00h BRT) + dispatch manual.
    if: >-
      github.event.schedule == '0 3 * * *' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'orchestrator'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Dispara orchestrator tick
        env:
          DISPARO: ${{ secrets.LEILOAI_DISPARO_SECRET }}
        run: |
          set -euo pipefail
          curl -sSf -X POST -H "x-disparo-secret: ${DISPARO}" \
            "https://leiloai-orchestrator.renatopassos516.workers.dev/tick" \
            | head -c 500
          echo

  inss:
    # DESABILITADO 2026-05-06: worker leiloai-ingestao-inss retorna 404
    # (worker deletado ou nao deployado mais). Cron 1x/dia falhando.
    # Re-habilitar quando worker for recriado.
    if: false  # github.event.inputs.job == 'inss' (manual override removido)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Dispara worker INSS (editais de imoveis)
        env:
          DISPARO: ${{ secrets.LEILOAI_DISPARO_SECRET }}
        run: |
          set -euo pipefail
          curl -sSf -H "x-disparo-secret: ${DISPARO}" \
            "https://leiloai-ingestao-inss.renatopassos516.workers.dev/run" \
            --max-time 600 \
            | head -c 500
          echo

  seuimovelbb:
    if: >-
      github.event.schedule == '40 */6 * * *' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'seuimovelbb'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Dispara worker seuimovelbb (scan IDs BB)
        env:
          DISPARO: ${{ secrets.LEILOAI_DISPARO_SECRET }}
        run: |
          set -euo pipefail
          curl -sSf -H "x-disparo-secret: ${DISPARO}" \
            "https://leiloai-ingestao-seuimovelbb.renatopassos516.workers.dev/run" \
            --max-time 600 \
            | head -c 500
          echo

  spyleiloes:
    if: >-
      github.event.schedule == '50 */6 * * *' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'spyleiloes'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        uf:
          [ac, al, ap, am, ba, ce, df, es, go, ma, mg, ms, mt, pa, pb, pe,
           pi, pr, rj, rn, ro, rr, rs, sc, se, sp, to]
    steps:
      - name: Dispara worker spyleiloes ${{ matrix.uf }}
        env:
          DISPARO: ${{ secrets.LEILOAI_DISPARO_SECRET }}
        run: |
          set -euo pipefail
          curl -sSf -H "x-disparo-secret: ${DISPARO}" \
            "https://leiloai-ingestao-spyleiloes.renatopassos516.workers.dev/run?uf=${{ matrix.uf }}" \
            --max-time 600 \
            | head -c 500
          echo

  querido_diario:
    if: >-
      github.event.schedule == '0 9 * * *' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'querido_diario'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Dispara worker querido-diario (diarios oficiais municipais)
        env:
          DISPARO: ${{ secrets.LEILOAI_DISPARO_SECRET }}
        run: |
          set -euo pipefail
          curl -sSf -H "x-disparo-secret: ${DISPARO}" \
            "https://leiloai-ingest-querido-diario.renatopassos516.workers.dev/run" \
            --max-time 600 \
            | head -c 500
          echo

  hard_delete_lgpd:
    if: >-
      github.event.schedule == '0 3 * * *' ||
      github.event.inputs.job == 'all' ||
      github.event.inputs.job == 'hard_delete'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Hard-delete contas soft-deleted > 30 dias
        env:
          URL: ${{ secrets.LEILOAI_SUPABASE_URL }}
          SR: ${{ secrets.LEILOAI_SUPABASE_SR }}
        run: |
          set -euo pipefail
          # Busca contas soft-deleted há mais de 30 dias
          LIMIT_DATE=$(date -u -d '30 days ago' '+%Y-%m-%dT%H:%M:%SZ')
          echo "Procurando contas soft-deleted antes de: $LIMIT_DATE"
          RESP=$(curl -sS -X DELETE \
            "${URL}/rest/v1/users?deleted_at=lt.${LIMIT_DATE}&deleted_at=not.is.null" \
            -H "apikey: ${SR}" \
            -H "Authorization: Bearer ${SR}" \
            -H "Prefer: return=minimal" \
            -w "\n%{http_code}")
          echo "Resposta: $RESP"
