name: "Restart Supabase"
on:
  workflow_dispatch:

jobs:
  restart:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_KEY_B64: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          mkdir -p ~/.ssh
          if printf '%s' "$SSH_KEY_B64" | grep -q -- '-----BEGIN'; then
            printf '%s\n' "$SSH_KEY_B64" > ~/.ssh/oracle_key
          else
            printf '%s' "$SSH_KEY_B64" | base64 -d > ~/.ssh/oracle_key
          fi
          chmod 600 ~/.ssh/oracle_key
          ssh-keyscan -H "$ORACLE_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy and Execute SQL
        env:
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          scp -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no create-items.sql "$ORACLE_USER@$ORACLE_HOST:/tmp/create-items.sql"
          ssh -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no "$ORACLE_USER@$ORACLE_HOST" '
            docker exec -i supabase-db psql -U postgres -d postgres -c "ALTER TABLE public.items DROP CONSTRAINT items_dedup_key_key;"
          '
