# Satoshi's House - Newsletter (i18n: pt-BR + en + es)
# Clona repo privado via PAT, envia 3 newsletters (uma por locale).
# Cada locale tem subscribers, template e URL prefix proprios.
# Atualizado 27/04/2026: roda send_newsletter.py 3x com LOCALE diferente.

name: "Satoshi's House: Send Newsletter"

on:
  schedule:
    - cron: '0 21 * * 5'
    - cron: '0 12 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Modo teste (nao envia emails de verdade)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      locales:
        description: 'Locales separados por virgula (default: pt-BR,en,es)'
        required: false
        default: 'pt-BR,en,es'
        type: string

concurrency:
  group: satoshis-house-newsletter
  cancel-in-progress: false

jobs:
  send-newsletter:
    name: Enviar Newsletter (i18n)
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v4
        with:
          repository: RenatoPassos1/satoshi-s-house
          token: ${{ secrets.REPO_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: newsletter/requirements.txt

      - name: Install dependencies
        run: pip install -r newsletter/requirements.txt

      - name: Send Newsletter (loop pt-BR + en + es)
        working-directory: newsletter
        env:
          API_URL:    ${{ secrets.NL_API_URL }}
          API_KEY:    ${{ secrets.NL_API_KEY }}
          SMTP_HOST:  ${{ secrets.NL_SMTP_HOST }}
          SMTP_PORT:  ${{ secrets.NL_SMTP_PORT }}
          SMTP_USER:  ${{ secrets.NL_SMTP_USER }}
          SMTP_PASS:  ${{ secrets.NL_SMTP_PASS }}
          FROM_EMAIL: ${{ secrets.NL_FROM_EMAIL }}
          FROM_NAME:  ${{ secrets.NL_FROM_NAME }}
          SITE_URL:   ${{ secrets.NL_SITE_URL }}
          SEND_DELAY: '2'
          DRY_RUN:    ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          LOCALES:    ${{ github.event_name == 'workflow_dispatch' && inputs.locales || 'pt-BR,en,es' }}
        run: |
          set +e
          OVERALL_FAIL=0
          IFS=',' read -ra LOC_ARR <<< "$LOCALES"
          for LOC in "${LOC_ARR[@]}"; do
            LOC=$(echo "$LOC" | xargs)
            echo "=========================================="
            echo "  Sending newsletter for locale: $LOC"
            echo "=========================================="
            ATTEMPTS=0
            MAX=3
            RETRY=900
            while [ $ATTEMPTS -lt $MAX ]; do
              ATTEMPTS=$((ATTEMPTS+1))
              echo "--- $LOC attempt $ATTEMPTS/$MAX ---"
              LOCALE="$LOC" python src/send_newsletter.py
              CODE=$?
              if [ $CODE -eq 0 ]; then
                echo "$LOC OK on attempt $ATTEMPTS"
                break
              fi
              if [ $ATTEMPTS -lt $MAX ]; then
                echo "$LOC failed (exit $CODE). Sleeping ${RETRY}s..."
                sleep $RETRY
              else
                echo "$LOC FAILED after $MAX attempts"
                OVERALL_FAIL=1
              fi
            done
          done
          exit $OVERALL_FAIL
