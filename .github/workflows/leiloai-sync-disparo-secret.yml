# LeilôAI: Sincroniza DISPARO_SECRET em todos os workers Cloudflare
#
# Por que existe:
#   Os crons (.github/workflows/leiloai-crons.yml) enviam o header
#   x-disparo-secret = secrets.LEILOAI_DISPARO_SECRET. Cada worker valida
#   via verificarSecret() comparando com env.DISPARO_SECRET do proprio
#   worker. Se o secret do worker driftar do valor do GitHub, o cron
#   recebe HTTP 401 (caso classico: leiloai-enrichment-ia).
#
#   Secrets Cloudflare/GitHub sao write-only (nao da pra ler o valor pra
#   comparar). A unica forma deterministica de garantir igualdade e o
#   GitHub Actions (que detem o valor canonico) reescrever o secret em
#   cada worker. Idempotente: setar o valor que ja deveria estar la nao
#   quebra nada; so conserta o worker que driftou.
#
#   Rode este workflow sempre que um cron retornar 401, ou apos recriar
#   um worker. Seguro re-rodar quando quiser.
#
# Secrets necessarios (ja existem no actions-engine):
#   REPO_PAT               checkout do leilao-watch (privado, source dos workers)
#   LEILOAI_DISPARO_SECRET valor canonico do x-disparo-secret
#   LEILOAI_CF_TOKEN       Cloudflare API token (Workers Edit)
#   LEILOAI_CF_ACCOUNT     Cloudflare account id

name: "LeilôAI: Sync DISPARO_SECRET"

on:
  workflow_dispatch:
    inputs:
      worker:
        description: "Worker alvo (nome) ou 'all' pra todos"
        required: true
        default: "all"
        type: string
  workflow_call:
    inputs:
      worker:
        description: "Worker alvo (nome) ou 'all'"
        required: false
        default: "all"
        type: string

concurrency:
  group: leiloai-sync-disparo
  cancel-in-progress: false

jobs:
  sync:
    name: Sync ${{ matrix.worker.name }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      max-parallel: 6
      matrix:
        worker:
          - { dir: "services/ingestion/caixa",          name: "caixa" }
          - { dir: "services/ingestion/detran",         name: "detran" }
          - { dir: "services/ingestion/bb",             name: "bb" }
          - { dir: "services/ingestion/receita",        name: "receita" }
          - { dir: "services/ingestion/dou",            name: "dou" }
          - { dir: "services/ingestion/doe",            name: "doe" }
          - { dir: "services/ingestion/djen",           name: "djen" }
          - { dir: "services/ingestion/datajud",        name: "datajud" }
          - { dir: "services/ingestion/bancos",         name: "bancos" }
          - { dir: "services/ingestion/agregadores",    name: "agregadores" }
          - { dir: "services/ingestion/marketplaces",   name: "marketplaces" }
          - { dir: "services/ingestion/rental",         name: "rental" }
          - { dir: "services/ingestion/inss",           name: "inss" }
          - { dir: "services/ingestion/seuimovelbb",    name: "seuimovelbb" }
          - { dir: "services/ingestion/spyleiloes",     name: "spyleiloes" }
          - { dir: "services/ingestion/querido-diario", name: "querido-diario" }
          - { dir: "services/enrichment",               name: "enrichment" }
          - { dir: "services/enrichment-ia",            name: "enrichment-ia" }
          - { dir: "services/rate-limit",               name: "rate-limit" }
          - { dir: "services/orchestrator",             name: "orchestrator" }

    steps:
      - name: Skip se nao for o alvo
        id: gate
        run: |
          set -eu
          TARGET='${{ inputs.worker || 'all' }}'
          if [ "$TARGET" = "all" ] || [ "$TARGET" = "${{ matrix.worker.name }}" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Worker ${{ matrix.worker.name }} fora do alvo ($TARGET). Skip."
          fi

      - name: Checkout leilao-watch
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          repository: RenatoPassos1/leilao-watch
          token: ${{ secrets.REPO_PAT }}
          ref: feat/landing
          fetch-depth: 1

      - name: Setup Node.js
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Wrangler
        if: steps.gate.outputs.run == 'true'
        run: npm install -g wrangler@latest

      - name: Set DISPARO_SECRET em ${{ matrix.worker.name }}
        if: steps.gate.outputs.run == 'true'
        working-directory: ${{ matrix.worker.dir }}
        env:
          DISPARO: ${{ secrets.LEILOAI_DISPARO_SECRET }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.LEILOAI_CF_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.LEILOAI_CF_ACCOUNT }}
        run: |
          set -euo pipefail
          # printf via stdin: o valor nunca aparece em argv nem no log.
          printf '%s' "$DISPARO" | wrangler secret put DISPARO_SECRET
          echo "✓ DISPARO_SECRET sincronizado em ${{ matrix.worker.name }}"

      - name: Summary
        if: always() && steps.gate.outputs.run == 'true'
        run: |
          echo "- \`${{ matrix.worker.name }}\`: DISPARO_SECRET sync (job ${{ job.status }})" >> $GITHUB_STEP_SUMMARY
