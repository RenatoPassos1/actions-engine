# UtilizAí — News Pipeline Cron (fonte primária)
#
# Histórico: em 20/04/2026 o cron do Vercel Hobby não disparou (silent fail,
# sem logs, sem alerta). Workflow original no Vercel foi aposentado em
# 21/04/2026 — passamos a depender EXCLUSIVAMENTE de GitHub Actions em
# repo público (minutos ilimitados, logs completos, history pública).
#
# Agenda: 4 runs/dia pra compensar dedup agressivo por source_url.
# - 12:00 UTC (09:00 BRT) — manhã
# - 16:00 UTC (13:00 BRT) — início tarde
# - 20:00 UTC (17:00 BRT) — fim tarde
# - 00:00 UTC (21:00 BRT, véspera) — noite
#
# Por que 4x e não 24x: cada run processa feeds que podem ter novos items.
# Feeds brasileiros atualizam manhã/tarde/noite. 4 janelas capturam bem
# sem desperdiçar LLM compute (Ollama local ~30-60s/artigo).
#
# Dedup: news-ingest tem UNIQUE index em source_url + isAlreadyInDb per-item.
# Rodar 4x no mesmo dia NÃO gera duplicatas, só mais artigos de items novos.
#
# Manual: Actions > "UtilizAí: News Pipeline Cron" > Run workflow.
#
# Setup pré-requisito (1x, já feito em 21/04/2026):
# 1. Neste repo (actions-engine): Settings → Secrets and variables → Actions
#    UTILIZAI_CRON_SECRET = mesmo valor do Vercel env var CRON_SECRET
#    (Opcional) UTILIZAI_APP_URL = URL base
#
# IMPORTANTE (2026-05-16): default = https://utilizai-platform.vercel.app
# (alias de producao Vercel, MESMO que o master usa internamente). NAO usar
# o dominio xn--utiliza-eza.com aqui: ele passa pelo proxy Cloudflare, que
# tem timeout fixo ~100s e devolve HTTP 524 antes do master terminar (o
# master roda 8+ sub-jobs sequenciais, maxDuration=300). O trabalho ate
# completava server-side no Vercel, mas o workflow via 524 e marcava
# falha. Indo direto no alias Vercel, o limite vira o maxDuration=300 e o
# curl (--max-time 320) espera a resposta real (200 ou 500 fail-loud).

name: "UtilizAí: News Pipeline Cron"

on:
  schedule:
    - cron: '0 12 * * *'   # 09:00 BRT
    - cron: '0 16 * * *'   # 13:00 BRT
    - cron: '0 20 * * *'   # 17:00 BRT
    - cron: '0 0 * * *'    # 21:00 BRT (UTC 00:00)
  workflow_dispatch:
    inputs:
      reason:
        description: "Motivo do disparo manual"
        required: false
        default: "Manual trigger"

concurrency:
  group: utilizai-news-cron
  cancel-in-progress: false

jobs:
  trigger-master-cron:
    name: Call /api/cron/master
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger cron-master endpoint
        id: trigger
        env:
          CRON_SECRET: ${{ secrets.UTILIZAI_CRON_SECRET }}
          BASE_URL: ${{ vars.UTILIZAI_APP_URL || 'https://utilizai-platform.vercel.app' }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::UTILIZAI_CRON_SECRET not configured in repo secrets"
            exit 1
          fi
          echo "Triggering ${BASE_URL}/api/cron/master"
          RESPONSE_FILE=$(mktemp)
          HTTP_CODE=$(curl -sS -o "${RESPONSE_FILE}" -w "%{http_code}" \
            --max-time 320 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${BASE_URL}/api/cron/master")
          echo "HTTP status: ${HTTP_CODE}"
          echo "--- Response body ---"
          cat "${RESPONSE_FILE}"
          echo ""
          echo "---------------------"
          echo "http_code=${HTTP_CODE}" >> "$GITHUB_OUTPUT"
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::Cron returned HTTP ${HTTP_CODE} (esperado 200)"
            exit 1
          fi

      - name: Verify pipeline health after run
        if: always()
        env:
          BASE_URL: ${{ vars.UTILIZAI_APP_URL || 'https://utilizai-platform.vercel.app' }}
        run: |
          set -eu
          echo "Checking /api/cron/health..."
          curl -sS -o health.json -w "HTTP %{http_code}\n" "${BASE_URL}/api/cron/health" || true
          cat health.json 2>/dev/null || echo "(sem resposta)"

      - name: Summary
        if: always()
        run: |
          echo "## UtilizAí — News Pipeline Cron" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Data:** $(TZ='America/Sao_Paulo' date +'%d/%m/%Y %H:%M BRT')" >> $GITHUB_STEP_SUMMARY
          echo "- **Cron trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **HTTP status:** \`${{ steps.trigger.outputs.http_code }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Site:** https://utilizaí.com" >> $GITHUB_STEP_SUMMARY
          echo "- **Health:** https://utilizai-platform.vercel.app/api/cron/health" >> $GITHUB_STEP_SUMMARY
