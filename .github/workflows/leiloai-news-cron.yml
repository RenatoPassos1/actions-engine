# LeilôAI: Blog News Cron (gerador de noticias com IA)
#
# 2 runs/dia pra maximizar cobertura SERP:
#  - 11:00 UTC (08:00 BRT): formato "news" (reativo, gancho RSS noticioso)
#  - 17:00 UTC (14:00 BRT): formato rotacionado (howto/alerta), menos
#    dependente de noticiario diario, mais perene.
#
# Cada run puxa feeds RSS curados (Conjur, Migalhas, CNJ, STJ, G1, Valor,
# InfoMoney, Exame, Agencia Brasil, Poder360), filtra por 50+ keywords
# do nicho (leilao, inadimplencia, arrematacao, retomada, Lei 14.711),
# deduplica por source_url e pede ao DeepSeek um artigo com:
#  - Cadeia causal obrigatoria (fato -> leilao -> LeiloAI)
#  - Rotacao UF (long-tail geografico)
#  - FAQ embutida (3 a 5 perguntas, rich snippet)
#  - NewsArticle schema (elegibilidade Google Top Stories)
#  - 4+ links internos + mencao LeiloAI + /cadastro
#
# Dedup por source_url garante que se rodar mais vezes, nao duplica.
# Workflow_dispatch tem input "formato" pra forcar formato especifico.
#
# Setup:
#  LEILOAI_CRON_SECRET  = mesmo valor do Vercel env var CRON_SECRET
#  LEILOAI_APP_URL (opcional) = default https://leiloai.com

name: "LeilôAI: Blog News Cron"

on:
  schedule:
    - cron: "0 11 * * *" # 08:00 BRT, formato news
    - cron: "0 17 * * *" # 14:00 BRT, formato howto/alerta
  workflow_dispatch:
    inputs:
      formato:
        description: "Formato do post"
        required: false
        default: "auto"
        type: choice
        options:
          - auto
          - news
          - howto
          - alerta

concurrency:
  group: leiloai-news-cron
  cancel-in-progress: false

jobs:
  trigger-news-generator:
    name: Call /api/cron/news-generator
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Decidir formato por horario
        id: fmt
        env:
          INPUT_FORMATO: ${{ github.event.inputs.formato }}
          SCHEDULE_CRON: ${{ github.event.schedule }}
        run: |
          set -euo pipefail
          # Se for dispatch manual com formato explicito, usa ele
          if [ -n "${INPUT_FORMATO:-}" ] && [ "${INPUT_FORMATO}" != "auto" ]; then
            echo "formato=${INPUT_FORMATO}" >> "$GITHUB_OUTPUT"
          # Se for schedule de 11h UTC (08h BRT) -> news
          elif [ "${SCHEDULE_CRON:-}" = "0 11 * * *" ]; then
            echo "formato=news" >> "$GITHUB_OUTPUT"
          # Se for schedule de 17h UTC (14h BRT) -> alterna howto/alerta por dia
          elif [ "${SCHEDULE_CRON:-}" = "0 17 * * *" ]; then
            DOW=$(date -u +%u)
            # Seg/Qua/Sex = howto, Ter/Qui/Sab/Dom = alerta
            if [ "$DOW" = "1" ] || [ "$DOW" = "3" ] || [ "$DOW" = "5" ]; then
              echo "formato=howto" >> "$GITHUB_OUTPUT"
            else
              echo "formato=alerta" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "formato=auto" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger news-generator
        id: trigger
        env:
          CRON_SECRET: ${{ secrets.LEILOAI_CRON_SECRET }}
          BASE_URL: ${{ vars.LEILOAI_APP_URL || 'https://leiloai.com' }}
          FORMATO: ${{ steps.fmt.outputs.formato }}
        run: |
          set -euo pipefail
          if [ -z "${CRON_SECRET}" ]; then
            echo "::error::LEILOAI_CRON_SECRET not configured"
            exit 1
          fi
          URL="${BASE_URL}/api/cron/news-generator"
          if [ -n "${FORMATO:-}" ] && [ "${FORMATO}" != "auto" ]; then
            URL="${URL}?formato=${FORMATO}"
          fi
          echo "Triggering ${URL}"
          RESPONSE_FILE=$(mktemp)
          # Geracao com IA + RSS as vezes da 500 transitorio (cold start,
          # blip de DB/DeepSeek). max-time 180 cobre a geracao lenta;
          # 4 tentativas com backoff (20s/40s/60s) absorvem o transitorio.
          # So falha (e emaila) se persistir nas 4.
          HTTP_CODE="000"
          for attempt in 1 2 3 4; do
            HTTP_CODE=$(curl -sS -o "${RESPONSE_FILE}" -w "%{http_code}" \
              --max-time 180 \
              -X POST \
              -H "Authorization: Bearer ${CRON_SECRET}" \
              -H "Content-Type: application/json" \
              "${URL}" || echo "000")
            echo "Tentativa ${attempt}: HTTP ${HTTP_CODE}"
            [ "${HTTP_CODE}" = "200" ] && break
            [ "${attempt}" -lt 4 ] && sleep $(( attempt * 20 ))
          done
          echo "HTTP: ${HTTP_CODE}"
          echo "--- Body ---"
          cat "${RESPONSE_FILE}"
          echo ""
          echo "http_code=${HTTP_CODE}" >> "$GITHUB_OUTPUT"
          SLUG=$(cat "${RESPONSE_FILE}" | grep -oE '"slug":"[^"]+"' | head -1 | cut -d'"' -f4 || echo "")
          echo "slug=${SLUG}" >> "$GITHUB_OUTPUT"
          if [ "${HTTP_CODE}" != "200" ]; then
            echo "::error::News generator returned HTTP ${HTTP_CODE} apos 4 tentativas"
            exit 1
          fi

      - name: Summary
        if: always()
        env:
          BASE_URL: ${{ vars.LEILOAI_APP_URL || 'https://leiloai.com' }}
        run: |
          echo "## LeilôAI, Blog News Cron" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Data:** $(TZ='America/Sao_Paulo' date +'%d/%m/%Y %H:%M BRT')" >> $GITHUB_STEP_SUMMARY
          echo "- **Formato:** \`${{ steps.fmt.outputs.formato }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **HTTP:** \`${{ steps.trigger.outputs.http_code }}\`" >> $GITHUB_STEP_SUMMARY
          if [ -n "${{ steps.trigger.outputs.slug }}" ]; then
            echo "- **Publicado:** [\`${{ steps.trigger.outputs.slug }}\`](${BASE_URL}/blog/${{ steps.trigger.outputs.slug }})" >> $GITHUB_STEP_SUMMARY
          else
            echo "- **Publicado:** (nenhum, sem candidatos ou erro)" >> $GITHUB_STEP_SUMMARY
          fi
          echo "- **Blog:** https://leiloai.com/blog" >> $GITHUB_STEP_SUMMARY
          echo "- **News sitemap:** https://leiloai.com/news-sitemap.xml" >> $GITHUB_STEP_SUMMARY
