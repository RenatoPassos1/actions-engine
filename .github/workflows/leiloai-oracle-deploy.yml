# LeiloAI - Deploy automatico para Oracle VPS
# Substitui o auto-deploy via Vercel apos migracao para Oracle.
# Polla HEAD do branch feat/landing do leilao-watch a cada 5 min.
# Se SHA mudou: ssh para Oracle, git pull, docker build, docker restart.
#
# Pre-requisitos (secrets em actions-engine):
#   ORACLE_SSH_KEY        - chave privada SSH (openclaw_do) base64 encoded
#   ORACLE_HOST           - 137.131.143.236
#   ORACLE_USER           - ubuntu
#   LEILOAI_REPO_PAT      - PAT com read:repo no leilao-watch (privado)

name: "LeiloAI: Oracle Auto-Deploy (poll feat/landing SHA)"

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: leiloai-oracle-deploy
  cancel-in-progress: false

jobs:
  poll-and-deploy:
    name: Poll SHA and deploy if changed
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Get HEAD SHA of leilao-watch/feat/landing
        id: sha
        env:
          GH_TOKEN: ${{ secrets.LEILOAI_REPO_PAT }}
        run: |
          SHA=$(gh api repos/RenatoPassos1/leilao-watch/commits/feat/landing --jq '.sha')
          if [ -z "$SHA" ]; then
            echo "::error::Failed to fetch HEAD SHA"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Current HEAD: $SHA"

      - name: Restore last deployed SHA cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .last-deployed-sha
          key: leiloai-oracle-last-deployed-sha

      - name: Compare SHAs
        id: compare
        run: |
          CURRENT="${{ steps.sha.outputs.sha }}"
          if [ -f .last-deployed-sha ]; then
            LAST=$(cat .last-deployed-sha)
          else
            LAST=""
          fi
          if [ "$CURRENT" = "$LAST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SHA matches last deploy, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New SHA detected, will deploy"
          fi

      - name: Setup SSH
        if: steps.compare.outputs.skip == 'false'
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ORACLE_SSH_KEY }}" | base64 -d > ~/.ssh/oracle_key
          chmod 600 ~/.ssh/oracle_key
          ssh-keyscan -H ${{ secrets.ORACLE_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Oracle
        if: steps.compare.outputs.skip == 'false'
        env:
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          ssh -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no \
            "$ORACLE_USER@$ORACLE_HOST" \
            'cd /home/ubuntu/apps/leiloai && \
             git fetch origin && \
             git reset --hard origin/feat/landing && \
             sed -i "s/^\([A-Z_][A-Z0-9_]*\)=\"\(.*\)\"$/\1=\2/" apps/web/.env.production && \
             docker build -t leiloai-web:new . && \
             docker stop leiloai-web 2>/dev/null || true && \
             docker rm leiloai-web 2>/dev/null || true && \
             docker tag leiloai-web:new leiloai-web:latest && \
             docker run -d --name leiloai-web --restart unless-stopped \
               --env-file /home/ubuntu/apps/leiloai/apps/web/.env.production \
               -p 127.0.0.1:3010:3010 leiloai-web:latest && \
             sleep 8 && \
             docker logs leiloai-web 2>&1 | tail -20 && \
             curl -fsS http://127.0.0.1:3010/ -o /dev/null -w "OK %{http_code}\n"'

      - name: Save deployed SHA
        if: steps.compare.outputs.skip == 'false'
        run: echo "${{ steps.sha.outputs.sha }}" > .last-deployed-sha

      - name: Cache deployed SHA
        if: steps.compare.outputs.skip == 'false'
        uses: actions/cache/save@v4
        with:
          path: .last-deployed-sha
          key: leiloai-oracle-last-deployed-sha

      - name: Summary
        if: always()
        run: |
          echo "## LeiloAI Oracle Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- HEAD SHA: \`${{ steps.sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Skipped: ${{ steps.compare.outputs.skip }}" >> $GITHUB_STEP_SUMMARY
          echo "- Site: https://leiloai.com" >> $GITHUB_STEP_SUMMARY
