name: "Richesse Club: Show full Caddyfile"
on:
  workflow_dispatch:
jobs:
  show:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Setup SSH
        run: mkdir -p ~/.ssh && echo "${{ secrets.ORACLE_SSH_KEY }}" | base64 -d > ~/.ssh/oracle_key && chmod 600 ~/.ssh/oracle_key
      - name: Show
        env:
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          ssh -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no \
            "$ORACLE_USER@$ORACLE_HOST" \
            "set -euo pipefail
             echo '=== Linhas 175-220 do Caddyfile (richesseclub block) ==='
             sudo sed -n '175,220p' /etc/caddy/Caddyfile
             echo '=== richesseclub block start->end ==='
             sudo awk '/^richesseclub.com,/,/^}/' /etc/caddy/Caddyfile"
