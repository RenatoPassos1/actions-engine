# UtilizAí — Enrichment de imagens (SEO thin content fix) - MATRIX 4 SHARDS
#
# Contexto: ~24k imagens editoriais publicadas tinham description curta (<300 chars),
# classificadas como "thin content" no GSC. Re-escreve description_pt/en em
# Markdown com lead + Sobre o tema + FAQ.
#
# Estratégia matrix: 4 shards paralelos. Cada shard pega ~1/4 dos itens via
# FNV-1a hash do slug % 4. Sem overlap, sem duplicação.
#
# Persistência: tabela `images` (Supabase). Idempotente, skipa quem já tem
# description_pt > 300 chars.
#
# Schedule: a cada 5h (offset 45min vs questions).
#
# Secrets esperados:
#   REPO_PAT, UTILIZAI_DEEPSEEK_API_KEY, UTILIZAI_GROQ_API_KEY[_2-5],
#   UTILIZAI_SUPABASE_URL, UTILIZAI_SUPABASE_SERVICE_ROLE_KEY

name: "UtilizAí: Enrich Images (SEO)"

on:
  schedule:
    - cron: '45 */5 * * *'
  workflow_dispatch:
    inputs:
      concurrency:
        description: "Workers paralelos por shard (default 8)"
        required: false
        default: "8"
      limit:
        description: "Limite por shard (default 99999)"
        required: false
        default: "99999"
      total_shards:
        description: "Total de shards paralelos (default 8)"
        required: false
        default: "8"
      category:
        description: "Filtrar por categoria (opcional)"
        required: false
        default: ""

concurrency:
  group: utilizai-enrich-images
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  enrich:
    name: Shard ${{ matrix.shard }}/${{ github.event.inputs.total_shards || '8' }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3, 4, 5, 6, 7]

    steps:
      - name: Checkout UtilizAi (private)
        uses: actions/checkout@v4
        with:
          repository: RenatoPassos1/UtilizAi
          token: ${{ secrets.REPO_PAT }}
          ref: main
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci --no-audit --no-fund

      - name: Run enrichment (shard ${{ matrix.shard }})
        env:
          NEXT_PUBLIC_SUPABASE_URL:   ${{ secrets.UTILIZAI_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:        ${{ secrets.UTILIZAI_SUPABASE_SERVICE_ROLE_KEY }}
          DEEPSEEK_API_KEY:           ${{ secrets.UTILIZAI_DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL:          https://api.deepseek.com
          DEEPSEEK_MODEL:             deepseek-v4-flash
          GROQ_API_KEY:               ${{ secrets.UTILIZAI_GROQ_API_KEY }}
          GROQ_API_KEY_2:             ${{ secrets.UTILIZAI_GROQ_API_KEY_2 }}
          GROQ_API_KEY_3:             ${{ secrets.UTILIZAI_GROQ_API_KEY_3 }}
          GROQ_API_KEY_4:             ${{ secrets.UTILIZAI_GROQ_API_KEY_4 }}
          GROQ_API_KEY_5:             ${{ secrets.UTILIZAI_GROQ_API_KEY_5 }}
          GROQ_MODELS:                "meta-llama/llama-4-scout-17b-16e-instruct,qwen/qwen3-32b,llama-3.3-70b-versatile,allam-2-7b"
          NODE_OPTIONS:               "--max-old-space-size=4096"
        run: |
          set -eu
          CONCURRENCY="${{ github.event.inputs.concurrency || '8' }}"
          LIMIT="${{ github.event.inputs.limit || '99999' }}"
          TOTAL_SHARDS="${{ github.event.inputs.total_shards || '8' }}"
          SHARD="${{ matrix.shard }}"
          CATEGORY="${{ github.event.inputs.category || '' }}"
          ARGS="--concurrency ${CONCURRENCY} --limit ${LIMIT} --shard ${SHARD} --total-shards ${TOTAL_SHARDS}"
          if [ -n "${CATEGORY}" ]; then
            ARGS="${ARGS} --category ${CATEGORY}"
          fi
          echo "Starting enrich-thin-images.ts ${ARGS}"
          npx tsx scripts/enrich-thin-images.ts ${ARGS}

  summary:
    name: Coverage summary
    runs-on: ubuntu-latest
    needs: enrich
    if: always()
    steps:
      - name: Report enrichment coverage
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.UTILIZAI_SUPABASE_URL }}
          SUPABASE_SECRET_KEY:      ${{ secrets.UTILIZAI_SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set +e
          ENRICHED=$(curl -sS \
            "${NEXT_PUBLIC_SUPABASE_URL}/rest/v1/images?select=id&is_published=eq.true&description_pt=like.*Sobre%20o%20tema*" \
            -H "apikey: ${SUPABASE_SECRET_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SECRET_KEY}" \
            -H "Prefer: count=exact" \
            -H "Range: 0-0" -I 2>/dev/null | grep -i 'content-range' | awk -F'/' '{print $2}' | tr -d '\r')
          TOTAL=$(curl -sS \
            "${NEXT_PUBLIC_SUPABASE_URL}/rest/v1/images?select=id&is_published=eq.true" \
            -H "apikey: ${SUPABASE_SECRET_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SECRET_KEY}" \
            -H "Prefer: count=exact" \
            -H "Range: 0-0" -I 2>/dev/null | grep -i 'content-range' | awk -F'/' '{print $2}' | tr -d '\r')
          echo "## UtilizAí — Enrich Images (Matrix 8 shards)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Data:** $(TZ='America/Sao_Paulo' date +'%d/%m/%Y %H:%M BRT')" >> $GITHUB_STEP_SUMMARY
          echo "- **Trigger:** \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Enriched/Total:** \`${ENRICHED:-?}/${TOTAL:-?}\`" >> $GITHUB_STEP_SUMMARY
