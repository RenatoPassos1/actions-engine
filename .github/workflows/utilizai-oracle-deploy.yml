# UtilizAi - Deploy automatico para Oracle VPS
# Substitui o auto-deploy via Vercel (que estava quebrado).
# Polla HEAD do main do UtilizAi a cada 5 min.
# Se SHA mudou: ssh para Oracle, git pull, docker build, docker restart.
#
# Pre-requisitos (secrets em actions-engine):
#   ORACLE_SSH_KEY        - chave privada SSH (openclaw_do) base64 encoded
#   ORACLE_HOST           - 137.131.143.236
#   ORACLE_USER           - ubuntu
#   REPO_PAT              - PAT com read:repo no UtilizAi (privado)

name: "UtilizAi: Oracle Auto-Deploy (poll main SHA)"

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

concurrency:
  group: utilizai-oracle-deploy
  cancel-in-progress: false

jobs:
  poll-and-deploy:
    name: Poll SHA and deploy if changed
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Get HEAD SHA of UtilizAi/main
        id: sha
        env:
          GH_TOKEN: ${{ secrets.REPO_PAT }}
        run: |
          SHA=$(gh api repos/RenatoPassos1/UtilizAi/commits/main --jq '.sha')
          if [ -z "$SHA" ]; then
            echo "::error::Failed to fetch HEAD SHA"
            exit 1
          fi
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "Current HEAD: $SHA"

      - name: Restore last deployed SHA cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: .last-deployed-sha
          key: utilizai-oracle-last-deployed-sha

      - name: Compare SHAs
        id: compare
        run: |
          CURRENT="${{ steps.sha.outputs.sha }}"
          if [ -f .last-deployed-sha ]; then
            LAST=$(cat .last-deployed-sha)
          else
            LAST=""
          fi
          if [ "$CURRENT" = "$LAST" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "SHA matches last deploy, skipping"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "New SHA detected, will deploy"
          fi

      - name: Setup SSH
        if: steps.compare.outputs.skip == 'false'
        env:
          SSH_KEY_B64: ${{ secrets.ORACLE_SSH_KEY }}
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          mkdir -p ~/.ssh
          # Fix: echo trunca em newlines, secret base64 multi-linha quebrava.
          # printf '%s' preserva conteudo. Tambem aceita PEM raw (sem base64).
          if printf '%s' "$SSH_KEY_B64" | grep -q -- '-----BEGIN'; then
            printf '%s\n' "$SSH_KEY_B64" > ~/.ssh/oracle_key
          else
            printf '%s' "$SSH_KEY_B64" | base64 -d > ~/.ssh/oracle_key
          fi
          chmod 600 ~/.ssh/oracle_key
          ssh-keyscan -H "$ORACLE_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy to Oracle
        if: steps.compare.outputs.skip == 'false'
        env:
          ORACLE_USER: ${{ secrets.ORACLE_USER }}
          ORACLE_HOST: ${{ secrets.ORACLE_HOST }}
        run: |
          # set -e: se 'docker build' falhar, aborta AQUI sem tocar no
          # container atual (continua servindo a versao antiga) em vez de
          # cair na cadeia &&/|| antiga que pulava o stop e colidia no
          # 'docker run' ou deployava imagem stale.
          # prune -af sem filtro until: libera TODO cache/dangling, mata o
          # ENOSPC (causa real das falhas). docker rm -f: remove mesmo rodando.
          ssh -i ~/.ssh/oracle_key -o StrictHostKeyChecking=no \
            "$ORACLE_USER@$ORACLE_HOST" \
            'set -e; \
             cd /home/ubuntu/apps/utilizai; \
             git fetch origin; \
             git reset --hard origin/main; \
             sed -i "s/^\([A-Z_][A-Z0-9_]*\)=\"\(.*\)\"$/\1=\2/" .env.production; \
             python3 -c "import sys; p=sys.argv[1]; d=open(p,\"rb\").read(); n=d.count(bytes([0x5C,0x6E,0x0A])); d=d.replace(bytes([0x5C,0x6E,0x0A]),bytes([0x0A])); open(p,\"wb\").write(d); print(f\"strip backslash-n literal: {n}\")" .env.production; \
             docker builder prune -af 2>&1 | tail -3 || true; \
             docker image prune -af 2>&1 | tail -3 || true; \
             docker build -t utilizai-web:new .; \
             docker stop utilizai-web 2>/dev/null || true; \
             docker rm -f utilizai-web 2>/dev/null || true; \
             docker tag utilizai-web:new utilizai-web:latest; \
             docker run -d --name utilizai-web --restart unless-stopped \
               --env-file /home/ubuntu/apps/utilizai/.env.production \
               -p 127.0.0.1:3011:3011 utilizai-web:latest; \
             sleep 8; \
             docker logs utilizai-web 2>&1 | tail -20; \
             curl -fsS http://127.0.0.1:3011/ -o /dev/null -w "OK %{http_code}\n"; \
             df -h / | tail -1'

      - name: Save deployed SHA
        if: steps.compare.outputs.skip == 'false'
        run: echo "${{ steps.sha.outputs.sha }}" > .last-deployed-sha

      - name: Cache deployed SHA
        if: steps.compare.outputs.skip == 'false'
        uses: actions/cache/save@v4
        with:
          path: .last-deployed-sha
          key: utilizai-oracle-last-deployed-sha

      - name: Summary
        if: always()
        run: |
          echo "## UtilizAi Oracle Deploy" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- HEAD SHA: \`${{ steps.sha.outputs.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Skipped: ${{ steps.compare.outputs.skip }}" >> $GITHUB_STEP_SUMMARY
          echo "- Site: https://utilizaí.com" >> $GITHUB_STEP_SUMMARY
