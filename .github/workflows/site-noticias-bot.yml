# Site Notícias Bot — Update News Feed
# Clona repo privado via PAT, atualiza feed, commita e faz deploy

name: "Notícias Bot: Update News Feed"

on:
  schedule:
    - cron: "0 11 * * *"
    - cron: "0 15 * * *"
    - cron: "0 21 * * *"
  workflow_dispatch:

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout private repo
        uses: actions/checkout@v6
        with:
          repository: RenatoPassos1/site-noticias-bot
          token: ${{ secrets.REPO_PAT }}

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run news update script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        run: node scripts/update-news.mjs

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/noticias.json public/noticias.html data/cache.json
          git diff --cached --quiet || git commit -m "chore: update news feed $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.NB_FTP_HOST }}
          username: ${{ secrets.NB_FTP_USER }}
          password: ${{ secrets.NB_FTP_PASS }}
          server-dir: ${{ secrets.NB_REMOTE_DIR || '/public_html/' }}
          local-dir: ./public/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
